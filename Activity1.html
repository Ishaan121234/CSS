<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Phone Contact</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {

            background-color: #F0F0F2;

        }

        h1 {

            color: #FF5A43;

        }

        .card-label {

            font-size: 11px;

            color: #999;

            text-transform: uppercase;

        }

        pre {

            font-size: 13px;

            color: #333;

        }
    </style>
</head>

<body>

    <body class="py-4">

        <div class="container">

            <h1 class="mb-1">My Phone Contact</h1>

            <p class="text-muted mb-4">

                Introduction to Objects in JavaScript — Grade 4–6

            </p>



            <div class="card shadow-sm mb-3" style="max-width:400px;">

                <div class="card-body">

                    <h5 class="card-title" style="color:#FF5A43;">Contact Details</h5>

                    <ul class="list-group list-group-flush">

                        <li class="list-group-item">

                            <span class="card-label d-block">Name</span>

                            <strong id="name">—</strong>

                        </li>

                        <li class="list-group-item">

                            <span class="card-label d-block">Phone</span>

                            <strong id="phone">—</strong>

                        </li>

                        <li class="list-group-item">

                            <span class="card-label d-block">School</span>

                            <strong id="school">—</strong>

                        </li>

                        <li class="list-group-item">

                            <span class="card-label d-block">City</span>

                            <strong id="city">-</strong>

                        </li>

                        <li class="list-group-item">

                            <span class="card-label d-block">Sport</span>

                            <strong id="sport">-</strong>
                            </li>


                    </ul>

                </div>

            </div>



            <div class="card shadow-sm" style="max-width:400px;">

                <div class="card-body">

                    <h6 style="color:#FF5A43;">JavaScript Object Used</h6>

                    <pre id="codeDisplay" class="bg-light p-3 rounded border mb-0"></pre>

                </div>

            </div>

        </div>
        <script>
var myContact = {
    name:"Ishaan Ratheesh",
    phone:"13245-7980",
    school:"Global International School",
    city:"Bangkok",
    Sport:"Football",
    Soft Drink:"Coco-Cola"
   
};
var nameE1 = document.getElementById("name");
var phoneE1 = document.getElementById("phone");

nameE1.textContent = myContact.name;
phoneE1.textContent = myContact.phone;

var schoolE1 = document.getElementById("school");
var cityE1 = document.getElementById("city");

schoolE1.textContent = myContact["school"];
cityE1.textContent = myContact["city"];

var codeE1 = document.getElementById("codeDisplay");
codeE1.textContent = 
'var myContact = {\n' +

' name: "' + myContact.name + '",\n' +

' phone: "' + myContact.phone + '",\n' +

' school: "' + myContact["school"] + '",\n' +

' city: "' + myContact["city"] + '"\n' +

'};';
        </script>
    </body>

</html>
